# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/shipment_tracking
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin@123}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# JWT Configuration
# ===============================
jwt.secret=MyVerySecureSecretKeyForJWTTokenGenerationAndValidationPurpose2024
jwt.expiration=86400000

# ===============================
# Logging Configuration
# ===============================
logging.level.root=INFO
logging.level.com.stp.shipmenttracking=DEBUG
# Central configuration file for the Shipment Tracking application.
